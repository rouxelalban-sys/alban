<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#020610">
<title>JARVIS — Mentor</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="jarvis.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #020610;
  --text-primary: #EAF6FB;
  --text-secondary: #9FB6C4;
  --text-tertiary: #5E7686;
  --hud: #4FD8FF;
  --hud-bright: #9BEBFF;
  --hud-dim: rgba(79, 216, 255, 0.14);
  --hud-glow: rgba(79, 216, 255, 0.45);
  --cold: #3A4A66;
  --danger: #FF5C4D;
  --warning: #F2C063;
  --gold: #F2C063;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 40px; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 78% 12%, rgba(79,216,255,0.10), transparent 45%), radial-gradient(circle at 15% 85%, rgba(46,124,214,0.09), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,0.35), transparent 100%),
    radial-gradient(1px 1px at 68% 12%, rgba(190,230,255,0.30), transparent 100%),
    radial-gradient(1.5px 1.5px at 42% 58%, rgba(255,255,255,0.22), transparent 100%),
    radial-gradient(1px 1px at 86% 74%, rgba(190,230,255,0.28), transparent 100%),
    radial-gradient(1px 1px at 24% 86%, rgba(255,255,255,0.20), transparent 100%);
  background-size: 520px 520px, 460px 460px, 610px 610px, 550px 550px, 490px 490px;
  pointer-events: none; z-index: -1;
}
.page { max-width: 820px; margin: 0 auto; }
.dash-eyebrow { font-family: var(--font-mono); font-size: 9.5px; font-weight: 800; letter-spacing: 0.24em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
.dash-title {
  margin: 0 0 6px; font-size: 28px; font-weight: 700; letter-spacing: 0.06em;
  background: linear-gradient(180deg, #FFFFFF 0%, #4FD8FF 140%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
  filter: drop-shadow(0 0 14px rgba(79,216,255,0.30));
}

/* Avatar */
.avatar-wrap { position: relative; height: 240px; margin: 8px 0 4px; }
#avatarCanvas { width: 100%; height: 100%; display: block; }
.avatar-state {
  position: absolute; left: 50%; bottom: 6px; transform: translateX(-50%);
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); text-align: center;
}
.avatar-state b { color: var(--hud); }

/* Chat */
.chat { margin-top: 8px; }
.msgs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.msg { max-width: 82%; padding: 12px 15px; border-radius: 14px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
.msg.user { align-self: flex-end; background: linear-gradient(180deg, rgba(79,216,255,0.16), rgba(79,216,255,0.09)); border: 1px solid rgba(79,216,255,0.22); color: var(--text-primary); border-bottom-right-radius: 5px; }
.msg.bot { align-self: flex-start; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); color: var(--text-primary); border-bottom-left-radius: 5px; }
.msg.bot.think { color: var(--hud-bright); font-family: var(--font-mono); font-size: 12.5px; }
.msg.err { border-color: rgba(255,92,77,0.4); color: #FF9A8E; }
.dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--hud); margin-right: 4px; animation: blink 1.2s infinite; }
.dots span:nth-child(2){ animation-delay: .2s; } .dots span:nth-child(3){ animation-delay: .4s; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.3;transform:scale(.7);} }

.suggests { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
.suggest { border: 1px solid rgba(79,216,255,0.2); background: rgba(79,216,255,0.06); color: var(--hud-bright); border-radius: 999px; padding: 8px 13px; font-size: 12.5px; cursor: pointer; }
.suggest:hover { background: rgba(79,216,255,0.14); }

.composer { display: flex; gap: 8px; }
.composer input {
  flex: 1; padding: 13px 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 13px;
  background: rgba(0,0,0,0.3); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none;
}
.composer input:focus { border-color: rgba(79,216,255,0.45); box-shadow: 0 0 12px rgba(79,216,255,0.12); }
.composer button {
  padding: 0 20px; border: 0; border-radius: 13px; background: linear-gradient(180deg, #BFF0FF 0%, #5FCBEE 100%);
  color: #04121C; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
}
.composer button:disabled { opacity: 0.5; cursor: wait; }

.tools { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.tool-btn { border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--text-secondary); border-radius: 10px; padding: 8px 13px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; }
.tool-btn:hover { background: rgba(255,255,255,0.08); }
.panel { display: none; margin-top: 12px; }
.panel.open { display: block; }
.panel textarea {
  width: 100%; min-height: 120px; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  background: rgba(0,0,0,0.3); color: var(--text-primary); font-family: inherit; font-size: 13.5px; line-height: 1.5; outline: none; resize: vertical;
}
.panel textarea:focus { border-color: rgba(79,216,255,0.45); }
.mem-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: var(--text-primary); }
.mem-del { margin-left: auto; border: 0; background: transparent; color: var(--text-tertiary); font-size: 15px; cursor: pointer; }
.mem-del:hover { color: var(--danger); }
.muted { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
.save-row { margin-top: 10px; }
.save-btn { padding: 10px 16px; border: 0; border-radius: 11px; background: linear-gradient(180deg, #BFF0FF, #5FCBEE); color: #04121C; font-weight: 700; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div class="page">

  <div class="dash-eyebrow">Alban · Neural Link · JARVIS</div>
  <h1 class="dash-title">MENTOR</h1>

  <div class="avatar-wrap">
    <canvas id="avatarCanvas"></canvas>
    <div class="avatar-state" id="avatarState">— en veille —</div>
  </div>

  <div class="chat">
    <div class="msgs" id="msgs"></div>

    <div class="suggests" id="suggests">
      <div class="suggest">Comment je vais, globalement ?</div>
      <div class="suggest">Je m'entraîne aujourd'hui ?</div>
      <div class="suggest">Aide-moi à planifier ma journée</div>
    </div>

    <div class="composer">
      <input id="chatInput" placeholder="Parle à JARVIS…" autocomplete="off">
      <button id="sendBtn">Envoyer</button>
    </div>

    <div class="tools">
      <button class="tool-btn" id="profileTool">⚙ Profil</button>
      <button class="tool-btn" id="memTool">🧠 Mémoire</button>
    </div>

    <div class="panel" id="profilePanel">
      <div class="muted" style="margin-bottom:8px;">Qui tu es, tes objectifs, tes contraintes. JARVIS le lit à chaque conversation.</div>
      <textarea id="profileText" placeholder="Ex : 24 ans, ingénieur. Objectif escalade : premier 7a cette année. Je veux mieux dormir et être plus régulier à la salle. Je bosse mieux le matin…"></textarea>
      <div class="save-row"><button class="save-btn" id="saveProfile">Enregistrer le profil</button> <span class="muted" id="profileStatus"></span></div>
    </div>

    <div class="panel" id="memPanel">
      <div class="muted" style="margin-bottom:8px;">Ce que JARVIS a retenu de tes conversations.</div>
      <div id="memList"></div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';
  var SUPABASE_URL = 'https://uqvlfypjpgcubpmejqky.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_akUg3CaJheNW-l9j-WtTvw_klhPg20a';
  var SB = { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
  function $(id) { return document.getElementById(id); }

  // =============== 3D crystal avatar ===============
  var MOODS = {
    neutral:   { color: 0x4FD8FF, glow: 0x4FD8FF, spin: 0.35, intensity: 1.0, label: 'à l\'écoute' },
    thinking:  { color: 0x9BEBFF, glow: 0x4FD8FF, spin: 1.4,  intensity: 1.3, label: 'réflexion…' },
    happy:     { color: 0x6FF0D0, glow: 0x46D6A2, spin: 0.6,  intensity: 1.4, label: 'confiant' },
    celebrate: { color: 0xF2C063, glow: 0xF2C063, spin: 1.1,  intensity: 1.8, label: 'fier de toi' },
    concerned: { color: 0x6E9AD0, glow: 0x3A4A66, spin: 0.22, intensity: 0.7, label: 'attentif' }
  };
  var avatar = null;
  (function initAvatar() {
    if (typeof THREE === 'undefined') return;
    var canvas = $('avatarCanvas');
    var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
    camera.position.z = 4.2;

    var group = new THREE.Group(); scene.add(group);
    // core crystal
    var geo = new THREE.IcosahedronGeometry(1.15, 1);
    var mat = new THREE.MeshStandardMaterial({ color: 0x4FD8FF, emissive: 0x123043, metalness: 0.55, roughness: 0.18, flatShading: true, transparent: true, opacity: 0.92 });
    var crystal = new THREE.Mesh(geo, mat); group.add(crystal);
    // wireframe overlay
    var wire = new THREE.LineSegments(new THREE.WireframeGeometry(geo), new THREE.LineBasicMaterial({ color: 0x9BEBFF, transparent: true, opacity: 0.5 }));
    group.add(wire);
    // aura shell
    var aura = new THREE.Mesh(new THREE.SphereGeometry(1.7, 32, 32), new THREE.MeshBasicMaterial({ color: 0x4FD8FF, transparent: true, opacity: 0.06, side: THREE.BackSide }));
    group.add(aura);

    scene.add(new THREE.AmbientLight(0x22364a, 1.2));
    var l1 = new THREE.PointLight(0x4FD8FF, 1.5, 20); l1.position.set(3, 2, 4); scene.add(l1);
    var l2 = new THREE.PointLight(0xF26D5B, 0.8, 20); l2.position.set(-3, -2, 2); scene.add(l2);

    var target = MOODS.neutral, cur = { color: new THREE.Color(0x4FD8FF), glow: new THREE.Color(0x4FD8FF), spin: 0.35, intensity: 1.0 };
    var mouse = { x: 0, y: 0 };
    window.addEventListener('pointermove', function (e) {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    function resize() {
      var w = canvas.clientWidth, h = canvas.clientHeight;
      if (canvas.width !== w || canvas.height !== h) { renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix(); }
    }
    var t = 0;
    function loop() {
      requestAnimationFrame(loop); resize(); t += 0.016;
      // ease toward target mood
      cur.color.lerp(new THREE.Color(target.color), 0.05);
      cur.glow.lerp(new THREE.Color(target.glow), 0.05);
      cur.spin += (target.spin - cur.spin) * 0.05;
      cur.intensity += (target.intensity - cur.intensity) * 0.05;
      mat.color.copy(cur.color); wire.material.color.copy(cur.glow); aura.material.color.copy(cur.glow);
      l1.color.copy(cur.color); l1.intensity = 1.2 * cur.intensity;
      aura.material.opacity = 0.05 + 0.03 * cur.intensity + 0.015 * Math.sin(t * 2);
      var s = 1 + 0.04 * Math.sin(t * 1.6);
      group.scale.setScalar(s);
      group.position.y = Math.sin(t * 1.1) * 0.08;
      group.rotation.y += 0.01 * cur.spin;
      group.rotation.x += 0.004 * cur.spin;
      // look toward cursor
      group.rotation.y += (mouse.x * 0.4 - group.rotation.y % (Math.PI * 2)) * 0.0;
      group.rotation.z = mouse.x * 0.12;
      camera.position.x += (mouse.x * 0.5 - camera.position.x) * 0.05;
      camera.position.y += (-mouse.y * 0.4 - camera.position.y) * 0.05;
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
    }
    loop();
    avatar = { setMood: function (m) { target = MOODS[m] || MOODS.neutral; $('avatarState').innerHTML = '— <b>' + target.label + '</b> —'; } };
  })();
  function setMood(m) { if (avatar) avatar.setMood(m); }

  // =============== Chat ===============
  var msgs = $('msgs');
  function addMsg(text, cls) {
    var d = document.createElement('div'); d.className = 'msg ' + cls; d.textContent = text;
    msgs.appendChild(d); d.scrollIntoView({ behavior: 'smooth', block: 'end' }); return d;
  }
  function addThinking() {
    var d = document.createElement('div'); d.className = 'msg bot think';
    d.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
    msgs.appendChild(d); d.scrollIntoView({ behavior: 'smooth', block: 'end' }); return d;
  }

  var busy = false;
  async function send(text) {
    text = (text || $('chatInput').value).trim();
    if (!text || busy) return;
    busy = true; $('sendBtn').disabled = true;
    $('chatInput').value = '';
    $('suggests').style.display = 'none';
    addMsg(text, 'user');
    setMood('thinking');
    var thinkEl = addThinking();
    try {
      var res = await fetch('/api/mentor', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      var data = await res.json().catch(function () { return {}; });
      thinkEl.remove();
      if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
      addMsg(data.reply, 'bot');
      setMood(data.mood || 'neutral');
      if (data.newMemories) loadMemories();
    } catch (e) {
      thinkEl.remove();
      addMsg('Lien coupé : ' + e.message + (/ANTHROPIC/.test(e.message) ? ' (ajoute ANTHROPIC_API_KEY dans Vercel)' : ''), 'bot err');
      setMood('concerned');
    } finally {
      busy = false; $('sendBtn').disabled = false; $('chatInput').focus();
    }
  }
  $('sendBtn').addEventListener('click', function () { send(); });
  $('chatInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') send(); });
  document.querySelectorAll('.suggest').forEach(function (s) { s.addEventListener('click', function () { send(s.textContent); }); });

  // =============== Profile ===============
  $('profileTool').addEventListener('click', function () { $('profilePanel').classList.toggle('open'); $('memPanel').classList.remove('open'); });
  $('memTool').addEventListener('click', function () { $('memPanel').classList.toggle('open'); $('profilePanel').classList.remove('open'); loadMemories(); });

  async function loadProfile() {
    try {
      var r = await fetch(SUPABASE_URL + '/rest/v1/mentor_profile?select=content&id=eq.1', { headers: SB });
      var rows = r.ok ? await r.json() : [];
      if (rows[0]) $('profileText').value = rows[0].content || '';
    } catch (e) {}
  }
  $('saveProfile').addEventListener('click', async function () {
    var st = $('profileStatus'); st.textContent = 'Enregistrement…';
    try {
      var r = await fetch(SUPABASE_URL + '/rest/v1/mentor_profile?on_conflict=id', {
        method: 'POST', headers: Object.assign({ Prefer: 'resolution=merge-duplicates,return=minimal' }, SB),
        body: JSON.stringify({ id: 1, content: $('profileText').value, updated_at: new Date().toISOString() })
      });
      st.textContent = r.ok ? '✓ enregistré' : 'échec';
    } catch (e) { st.textContent = 'échec'; }
    setTimeout(function () { st.textContent = ''; }, 3000);
  });

  // =============== Memories ===============
  async function loadMemories() {
    var box = $('memList');
    try {
      var r = await fetch(SUPABASE_URL + '/rest/v1/mentor_memories?select=id,fact&archived=eq.false&order=created_at.desc&limit=50', { headers: SB });
      var rows = r.ok ? await r.json() : [];
      box.innerHTML = '';
      if (!rows.length) { box.innerHTML = '<div class="muted">Rien de retenu pour l\'instant — ça se remplira au fil de vos échanges.</div>'; return; }
      rows.forEach(function (m) {
        var d = document.createElement('div'); d.className = 'mem-item';
        d.innerHTML = '<span></span><button class="mem-del" title="Oublier">×</button>';
        d.querySelector('span').textContent = m.fact;
        d.querySelector('.mem-del').addEventListener('click', async function () {
          await fetch(SUPABASE_URL + '/rest/v1/mentor_memories?id=eq.' + m.id, { method: 'PATCH', headers: SB, body: JSON.stringify({ archived: true }) });
          loadMemories();
        });
        box.appendChild(d);
      });
    } catch (e) {}
  }

  // =============== Boot: greet + set mood from data ===============
  async function boot() {
    loadProfile();
    // Pick an opening mood from recent sleep
    var mood = 'neutral';
    try {
      var r = await fetch(SUPABASE_URL + '/rest/v1/zepp_sleep?select=sleep_start,sleep_end,awake_min&order=date.desc&limit=1', { headers: SB });
      var rows = r.ok ? await r.json() : [];
      if (rows[0] && rows[0].sleep_start && rows[0].sleep_end) {
        var h = ((new Date(rows[0].sleep_end) - new Date(rows[0].sleep_start)) / 60000 - (rows[0].awake_min || 0)) / 60;
        mood = h >= 7 ? 'happy' : (h < 6 ? 'concerned' : 'neutral');
      }
    } catch (e) {}
    setMood(mood);
    addMsg('Salut Alban. Je suis là — j\'ai tes données sous les yeux (sommeil, humeur, séances, objectifs). Qu\'est-ce qu\'on regarde ?', 'bot');
  }
  boot();
})();
</script>
</body>
</html>
